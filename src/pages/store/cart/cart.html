<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Carrito</title>
    <script>
      (function () {
        const LOGIN_PATH = "/src/pages/auth/login/login.html";
        const ADMIN_HOME_PATH = "/src/pages/admin/home/home.html";

        try {
          const userRaw = localStorage.getItem("userData");
          if (!userRaw) {
            window.location.replace(LOGIN_PATH);
            return;
          }

          const user = JSON.parse(userRaw);
          if (user?.role !== "client") {
            window.location.replace(ADMIN_HOME_PATH);
          }
        } catch {
          window.location.replace(LOGIN_PATH);
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f5f7;
        color: #1f2937;
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 1rem;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 1rem;
      }
      .actions {
        display: flex;
        gap: 0.6rem;
      }
      .btn {
        border: 0;
        border-radius: 0.5rem;
        background: #2563eb;
        color: #fff;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-secondary {
        background: #374151;
      }
      .cart-table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 0.75rem;
        overflow: hidden;
      }
      .cart-table th,
      .cart-table td {
        text-align: left;
        padding: 0.75rem;
        border-bottom: 1px solid #e5e7eb;
      }
      .qty-input {
        width: 70px;
        padding: 0.35rem;
      }
      .empty {
        background: #fff;
        border-radius: 0.75rem;
        padding: 1rem;
      }
      .total-box {
        margin-top: 1rem;
        background: #fff;
        border-radius: 0.75rem;
        padding: 1rem;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="topbar">
        <h1>Mi carrito</h1>
        <div class="actions">
          <a href="/src/pages/store/home/home.html" class="btn">Volver al catalogo</a>
          <button id="logoutButton" class="btn btn-secondary">Logout</button>
        </div>
      </div>

      <div id="cartContainer"></div>
      <div id="totalContainer" class="total-box"></div>
    </main>

    <script type="module" src="./cart.ts"></script>
  </body>
</html>
